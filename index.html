## 3. Activar GitHub Pages

1. Ve a **Settings** del repositorio
2. Menú izquierdo → **Pages**
3. En **Source** selecciona → **Deploy from a branch**
4. Branch: **main** / carpeta: **/ (root)**
5. Click **Save**
